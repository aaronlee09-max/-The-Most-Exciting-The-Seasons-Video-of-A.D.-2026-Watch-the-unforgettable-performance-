<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Playlist</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#player{
    width:100%;
    height:60vh;
    border:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
    padding:12px;
}

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    display:block;
}

.title{
    padding:8px;
    font-size:13px;
    color:#ddd;
    text-align:center;
}
</style>
</head>

<body>

<iframe
id="player"
src="https://www.youtube.com/embed/lgaXjICBcsc?autoplay=1&mute=1&controls=1"
allow="autoplay; encrypted-media"
allowfullscreen>

<div id="grid" class="grid"></div>

/* =========================
   ▶ 재생 (클릭 시에는 소리가 나오도록 mute=1 제거)
   ========================= */
function play(id){
    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id + "?autoplay=1&controls=1";
}

/* =========================
   🔄 API 로드 + 제목 표시 (50개씩 쪼개서 요청)
   ========================= */
async function loadVideos(){
    const titleMap = {};
    const chunkSize = 50;

    // 영상을 50개 단위로 나누어 API 요청 진행
    for (let i = 0; i < videos.length; i += chunkSize) {
        const chunk = videos.slice(i, i + chunkSize);
        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${chunk.join(",")}&key=${API_KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            (data.items || []).forEach(item => {
                titleMap[item.id] = item.snippet.title;
            });
        } catch (error) {
            console.error("유튜브 API 로드 중 오류 발생:", error);
        }
    }

    // 화면에 리스트 그리기
    videos.forEach(id => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="thumbnail">
            <div class="title">
                ${titleMap[id] || "제목 없음"}
            </div>
        `;

        card.onclick = () => play(id);
        grid.appendChild(card);
    });
}

/* =========================
   🚀 실행
   ========================= */
loadVideos();
